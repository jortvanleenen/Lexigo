<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lexigo - Extension Options</title>
    <link rel="stylesheet" type="text/css" href="./options.css" />
  </head>
  <body>
    <main id="content">
      <h1 id="title">Lexigo Options</h1>
      <form name="options-form" action="">
        <section class="option-row">
          <label class="option-name" for="language-selector">My language</label>
          <div class="option-value">
            <select id="language-selector">
              <option value="en">English (US)</option>
            </select>
          </div>
        </section>

        <section class="option-row">
          <h2 class="option-name">Pop-up definitions</h2>
          <div class="option-value">
            <p class="option-description">
              A pop-up with the definition appears when you double-click a word
              on a page.
            </p>
            <div class="option-inline">
              <label for="popup-dblclick-key">Only when holding:</label>
              <select name="popup-dblclick-key" id="popup-dblclick-key">
                <option value="none">No key (always)</option>
                <option value="ctrl" id="popup-dblclick-key-ctrl">Ctrl</option>
                <option value="alt">Alt</option>
                <option value="shift">Shift</option>
              </select>
            </div>
          </div>
        </section>

        <section class="option-row">
          <h2 class="option-name">Word history</h2>
          <div class="option-value">
            <div class="option-inline">
              <input
                type="checkbox"
                name="store-history-checkbox"
                id="store-history-checkbox"
              />
              <label for="store-history-checkbox">
                Store words I look up, including definitions
              </label>
            </div>
            <p class="option-description">
              Number of words stored in history:
              <span id="num-words-in-history">0</span>
            </p>
            <div class="option-inline">
              <button id="download-history-btn" class="btn btn-default">
                Download history
              </button>
              <a
                href="#"
                id="download-history-link"
                hidden
                download="Lexigo-words.csv"
                >Download Lexigo word history (CSV)</a
              >
              <button id="clear-history-btn" class="btn btn-default">
                Clear history
              </button>
            </div>
          </div>
        </section>

        <div class="btn-row">
          <button id="save-btn" class="btn btn-primary">Save</button>
          <button id="reset-btn" class="btn btn-default">Reset</button>
          <span id="save-status">Options saved</span>
        </div>
      </form>
    </main>
    <script type="text/javascript" src="./options.js"></script>
  </body>
</html>
